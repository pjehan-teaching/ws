<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" width="720" height="400">
  <defs>
    <marker id="arrow-req" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#268bd2"/>
    </marker>
    <marker id="arrow-res-empty" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#586e75"/>
    </marker>
    <marker id="arrow-res-data" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#859900"/>
    </marker>
  </defs>

  <!-- Fond transparent -->
  <rect width="720" height="400" fill="none"/>

  <!-- Titres participants -->
  <rect x="130" y="16" width="100" height="34" rx="6" fill="#268bd2"/>
  <text x="180" y="38" text-anchor="middle" fill="white" font-family="sans-serif" font-size="15" font-weight="bold">Client</text>

  <rect x="490" y="16" width="100" height="34" rx="6" fill="#2aa198"/>
  <text x="540" y="38" text-anchor="middle" fill="white" font-family="sans-serif" font-size="15" font-weight="bold">Serveur</text>

  <!-- Lifelines -->
  <line x1="180" y1="50" x2="180" y2="380" stroke="rgba(255,255,255,0.25)" stroke-width="2" stroke-dasharray="6,4"/>
  <line x1="540" y1="50" x2="540" y2="380" stroke="rgba(255,255,255,0.25)" stroke-width="2" stroke-dasharray="6,4"/>

  <!-- === Cycle 1 === -->
  <!-- Requête 1 -->
  <line x1="182" y1="90" x2="534" y2="90" stroke="#268bd2" stroke-width="2" marker-end="url(#arrow-req)"/>
  <text x="360" y="82" text-anchor="middle" fill="#268bd2" font-family="sans-serif" font-size="12">GET /api/messages</text>
  <!-- Réponse vide 1 -->
  <line x1="538" y1="118" x2="186" y2="118" stroke="#586e75" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrow-res-empty)"/>
  <text x="360" y="132" text-anchor="middle" fill="#586e75" font-family="sans-serif" font-size="12">[] — aucune donnée</text>

  <!-- setInterval wait -->
  <rect x="154" y="140" width="52" height="40" rx="4" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <text x="180" y="157" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-family="sans-serif" font-size="10">attente</text>
  <text x="180" y="171" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-family="sans-serif" font-size="10">2 sec</text>

  <!-- === Cycle 2 === -->
  <!-- Requête 2 -->
  <line x1="182" y1="196" x2="534" y2="196" stroke="#268bd2" stroke-width="2" marker-end="url(#arrow-req)"/>
  <text x="360" y="188" text-anchor="middle" fill="#268bd2" font-family="sans-serif" font-size="12">GET /api/messages</text>
  <!-- Réponse vide 2 -->
  <line x1="538" y1="224" x2="186" y2="224" stroke="#586e75" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrow-res-empty)"/>
  <text x="360" y="238" text-anchor="middle" fill="#586e75" font-family="sans-serif" font-size="12">[] — aucune donnée</text>

  <!-- setInterval wait -->
  <rect x="154" y="246" width="52" height="40" rx="4" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <text x="180" y="263" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-family="sans-serif" font-size="10">attente</text>
  <text x="180" y="277" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-family="sans-serif" font-size="10">2 sec</text>

  <!-- === Cycle 3 (données disponibles) === -->
  <!-- Requête 3 -->
  <line x1="182" y1="302" x2="534" y2="302" stroke="#268bd2" stroke-width="2" marker-end="url(#arrow-req)"/>
  <text x="360" y="294" text-anchor="middle" fill="#268bd2" font-family="sans-serif" font-size="12">GET /api/messages</text>
  <!-- Réponse avec données -->
  <line x1="538" y1="332" x2="186" y2="332" stroke="#859900" stroke-width="2.5" marker-end="url(#arrow-res-data)"/>
  <text x="360" y="352" text-anchor="middle" fill="#859900" font-family="sans-serif" font-size="12" font-weight="bold">[{id:1, text:"Bonjour"}]</text>

  <!-- Latence annotation -->
  <line x1="72" y1="90" x2="72" y2="332" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <line x1="64" y1="90" x2="80" y2="90" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <line x1="64" y1="332" x2="80" y2="332" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <text x="60" y="215" text-anchor="middle" fill="rgba(255,100,100,0.8)" font-family="sans-serif" font-size="11" transform="rotate(-90,60,215)">latence ≈ 4 sec</text>
</svg>
