<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" width="720" height="420">

  <!-- === Serveur io === -->
  <rect x="290" y="10" width="140" height="44" rx="8" fill="#010101" stroke="white" stroke-width="2" opacity="0.9"/>
  <text x="360" y="37" text-anchor="middle" fill="white" font-family="monospace" font-size="16" font-weight="bold">io  (Server)</text>

  <!-- Ligne serveur → namespaces -->
  <line x1="250" y1="54" x2="180" y2="100" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
  <line x1="470" y1="54" x2="540" y2="100" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
  <line x1="360" y1="54" x2="360" y2="100" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>

  <!-- === Namespace /chat === -->
  <rect x="80" y="100" width="200" height="40" rx="6" fill="#268bd2" opacity="0.85"/>
  <text x="180" y="125" text-anchor="middle" fill="white" font-family="monospace" font-size="14">/chat</text>

  <!-- Rooms sous /chat -->
  <line x1="130" y1="140" x2="110" y2="185" stroke="rgba(255,255,255,0.35)" stroke-width="1.5"/>
  <line x1="230" y1="140" x2="250" y2="185" stroke="rgba(255,255,255,0.35)" stroke-width="1.5"/>

  <rect x="50" y="185" width="120" height="34" rx="5" fill="#073642" stroke="#268bd2" stroke-width="1.5"/>
  <text x="110" y="207" text-anchor="middle" fill="#93a1a1" font-family="monospace" font-size="12">room: "général"</text>

  <rect x="190" y="185" width="120" height="34" rx="5" fill="#073642" stroke="#268bd2" stroke-width="1.5"/>
  <text x="250" y="207" text-anchor="middle" fill="#93a1a1" font-family="monospace" font-size="12">room: "support"</text>

  <!-- Sockets sous room général -->
  <line x1="90" y1="219" x2="80" y2="260" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
  <line x1="130" y1="219" x2="140" y2="260" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>

  <rect x="44" y="260" width="72" height="28" rx="4" fill="#073642" stroke="#586e75" stroke-width="1"/>
  <text x="80" y="279" text-anchor="middle" fill="#657b83" font-family="monospace" font-size="10">socket A</text>

  <rect x="124" y="260" width="72" height="28" rx="4" fill="#073642" stroke="#586e75" stroke-width="1"/>
  <text x="160" y="279" text-anchor="middle" fill="#657b83" font-family="monospace" font-size="10">socket B</text>

  <!-- Socket sous room support -->
  <line x1="250" y1="219" x2="250" y2="260" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
  <rect x="214" y="260" width="72" height="28" rx="4" fill="#073642" stroke="#586e75" stroke-width="1"/>
  <text x="250" y="279" text-anchor="middle" fill="#657b83" font-family="monospace" font-size="10">socket C</text>

  <!-- === Namespace /notifications === -->
  <rect x="440" y="100" width="240" height="40" rx="6" fill="#2aa198" opacity="0.85"/>
  <text x="560" y="125" text-anchor="middle" fill="white" font-family="monospace" font-size="14">/notifications</text>

  <!-- Room sous /notifications -->
  <line x1="560" y1="140" x2="560" y2="185" stroke="rgba(255,255,255,0.35)" stroke-width="1.5"/>
  <rect x="470" y="185" width="180" height="34" rx="5" fill="#073642" stroke="#2aa198" stroke-width="1.5"/>
  <text x="560" y="207" text-anchor="middle" fill="#93a1a1" font-family="monospace" font-size="12">room: "broadcast"</text>

  <!-- Sockets sous broadcast -->
  <line x1="520" y1="219" x2="510" y2="260" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
  <line x1="600" y1="219" x2="610" y2="260" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>

  <rect x="474" y="260" width="72" height="28" rx="4" fill="#073642" stroke="#586e75" stroke-width="1"/>
  <text x="510" y="279" text-anchor="middle" fill="#657b83" font-family="monospace" font-size="10">socket D</text>

  <rect x="574" y="260" width="72" height="28" rx="4" fill="#073642" stroke="#586e75" stroke-width="1"/>
  <text x="610" y="279" text-anchor="middle" fill="#657b83" font-family="monospace" font-size="10">socket E</text>

  <!-- === Namespace par défaut / === -->
  <rect x="290" y="100" width="140" height="40" rx="6" fill="#6c71c4" opacity="0.85"/>
  <text x="360" y="125" text-anchor="middle" fill="white" font-family="monospace" font-size="14">/ (défaut)</text>

  <!-- Légende -->
  <rect x="10" y="310" width="700" height="1" fill="rgba(255,255,255,0.15)"/>
  <rect x="30" y="330" width="18" height="18" rx="3" fill="#268bd2" opacity="0.85"/>
  <text x="56" y="344" fill="rgba(255,255,255,0.7)" font-family="sans-serif" font-size="12">Namespace</text>
  <rect x="170" y="330" width="18" height="18" rx="3" fill="#073642" stroke="#268bd2" stroke-width="1.5"/>
  <text x="196" y="344" fill="rgba(255,255,255,0.7)" font-family="sans-serif" font-size="12">Room</text>
  <rect x="290" y="330" width="18" height="18" rx="3" fill="#073642" stroke="#586e75" stroke-width="1"/>
  <text x="316" y="344" fill="rgba(255,255,255,0.7)" font-family="sans-serif" font-size="12">Socket (connexion client)</text>
</svg>
