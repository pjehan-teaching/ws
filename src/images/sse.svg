<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" width="720" height="400">
  <defs>
    <marker id="arrow-req" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#268bd2"/>
    </marker>
    <marker id="arrow-evt" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#d33682"/>
    </marker>
  </defs>

  <!-- Titres participants -->
  <rect x="130" y="16" width="100" height="34" rx="6" fill="#268bd2"/>
  <text x="180" y="38" text-anchor="middle" fill="white" font-family="sans-serif" font-size="15" font-weight="bold">Client</text>

  <rect x="490" y="16" width="100" height="34" rx="6" fill="#2aa198"/>
  <text x="540" y="38" text-anchor="middle" fill="white" font-family="sans-serif" font-size="15" font-weight="bold">Serveur</text>

  <!-- Lifelines -->
  <line x1="180" y1="50" x2="180" y2="380" stroke="rgba(255,255,255,0.25)" stroke-width="2" stroke-dasharray="6,4"/>
  <line x1="540" y1="50" x2="540" y2="380" stroke="rgba(255,255,255,0.25)" stroke-width="2" stroke-dasharray="6,4"/>

  <!-- Connexion EventSource (une seule requête) -->
  <line x1="182" y1="82" x2="534" y2="82" stroke="#268bd2" stroke-width="2" marker-end="url(#arrow-req)"/>
  <text x="360" y="74" text-anchor="middle" fill="#268bd2" font-family="sans-serif" font-size="12">GET /events  (Content-Type: text/event-stream)</text>

  <!-- Connexion maintenue ouverte -->
  <rect x="154" y="92" width="52" height="265" rx="4" fill="rgba(38,139,210,0.12)" stroke="#268bd2" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="180" y="240" text-anchor="middle" fill="rgba(38,139,210,0.6)" font-family="sans-serif" font-size="10" transform="rotate(-90,180,240)">connexion ouverte</text>

  <rect x="514" y="92" width="52" height="265" rx="4" fill="rgba(42,161,152,0.12)" stroke="#2aa198" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="540" y="240" text-anchor="middle" fill="rgba(42,161,152,0.6)" font-family="sans-serif" font-size="10" transform="rotate(-90,540,240)">diffusion active</text>

  <!-- Événements SSE -->
  <line x1="537" y1="120" x2="183" y2="120" stroke="#d33682" stroke-width="2" marker-end="url(#arrow-evt)"/>
  <text x="360" y="113" text-anchor="middle" fill="#d33682" font-family="sans-serif" font-size="12">data: {"type":"connected"}</text>

  <line x1="537" y1="175" x2="183" y2="175" stroke="#d33682" stroke-width="2" marker-end="url(#arrow-evt)"/>
  <text x="360" y="168" text-anchor="middle" fill="#d33682" font-family="sans-serif" font-size="12">event: tick  data: {"time":"12:00:01"}</text>

  <line x1="537" y1="230" x2="183" y2="230" stroke="#d33682" stroke-width="2" marker-end="url(#arrow-evt)"/>
  <text x="360" y="223" text-anchor="middle" fill="#d33682" font-family="sans-serif" font-size="12">event: tick  data: {"time":"12:00:02"}</text>

  <line x1="537" y1="285" x2="183" y2="285" stroke="#d33682" stroke-width="2" marker-end="url(#arrow-evt)"/>
  <text x="360" y="278" text-anchor="middle" fill="#d33682" font-family="sans-serif" font-size="12">event: notification  data: {"msg":"Nouveau"}</text>

  <!-- Légende unidirectionnel -->
  <text x="360" y="378" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-family="sans-serif" font-size="11">⚠ Communication unidirectionnelle : Serveur → Client uniquement</text>
</svg>
