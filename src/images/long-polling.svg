<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" width="720" height="400">
  <defs>
    <marker id="arrow-req" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#268bd2"/>
    </marker>
    <marker id="arrow-res" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#859900"/>
    </marker>
    <marker id="arrow-req2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#268bd2"/>
    </marker>
  </defs>

  <!-- Titres participants -->
  <rect x="130" y="16" width="100" height="34" rx="6" fill="#268bd2"/>
  <text x="180" y="38" text-anchor="middle" fill="white" font-family="sans-serif" font-size="15" font-weight="bold">Client</text>

  <rect x="490" y="16" width="100" height="34" rx="6" fill="#2aa198"/>
  <text x="540" y="38" text-anchor="middle" fill="white" font-family="sans-serif" font-size="15" font-weight="bold">Serveur</text>

  <!-- Lifelines -->
  <line x1="180" y1="50" x2="180" y2="380" stroke="rgba(255,255,255,0.25)" stroke-width="2" stroke-dasharray="6,4"/>
  <line x1="540" y1="50" x2="540" y2="380" stroke="rgba(255,255,255,0.25)" stroke-width="2" stroke-dasharray="6,4"/>

  <!-- === Cycle 1 === -->
  <!-- Requête -->
  <line x1="182" y1="85" x2="534" y2="85" stroke="#268bd2" stroke-width="2" marker-end="url(#arrow-req)"/>
  <text x="360" y="77" text-anchor="middle" fill="#268bd2" font-family="sans-serif" font-size="12">GET /api/long-poll</text>

  <!-- Serveur en attente d'événement -->
  <rect x="514" y="96" width="52" height="110" rx="4" fill="rgba(42,161,152,0.15)" stroke="#2aa198" stroke-width="1.5"/>
  <text x="540" y="138" text-anchor="middle" fill="#2aa198" font-family="sans-serif" font-size="10">en attente</text>
  <text x="540" y="153" text-anchor="middle" fill="#2aa198" font-family="sans-serif" font-size="10">d'un</text>
  <text x="540" y="168" text-anchor="middle" fill="#2aa198" font-family="sans-serif" font-size="10">événement</text>

  <!-- Événement survient -->
  <text x="628" y="190" text-anchor="start" fill="#b58900" font-family="sans-serif" font-size="11">💡 nouvel événement</text>
  <line x1="606" y1="193" x2="545" y2="208" stroke="#b58900" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Réponse avec données -->
  <line x1="538" y1="212" x2="186" y2="212" stroke="#859900" stroke-width="2.5" marker-end="url(#arrow-res)"/>
  <text x="360" y="228" text-anchor="middle" fill="#859900" font-family="sans-serif" font-size="12" font-weight="bold">{id:1, text:"Bonjour"}</text>

  <!-- === Cycle 2 (immédiat) === -->
  <!-- Requête immédiate -->
  <line x1="182" y1="248" x2="534" y2="248" stroke="#268bd2" stroke-width="2" marker-end="url(#arrow-req2)"/>
  <text x="360" y="240" text-anchor="middle" fill="#268bd2" font-family="sans-serif" font-size="12">GET /api/long-poll</text>
  <text x="90" y="252" text-anchor="middle" fill="rgba(255,200,0,0.7)" font-family="sans-serif" font-size="10">immédiat</text>

  <!-- Serveur en attente cycle 2 -->
  <rect x="514" y="258" width="52" height="100" rx="4" fill="rgba(42,161,152,0.15)" stroke="#2aa198" stroke-width="1.5"/>
  <text x="540" y="295" text-anchor="middle" fill="#2aa198" font-family="sans-serif" font-size="10">en attente…</text>

  <!-- Latence annotation -->
  <line x1="72" y1="85" x2="72" y2="212" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <line x1="64" y1="85" x2="80" y2="85" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <line x1="64" y1="212" x2="80" y2="212" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <text x="60" y="152" text-anchor="middle" fill="rgba(100,255,100,0.8)" font-family="sans-serif" font-size="11" transform="rotate(-90,60,152)">latence ≈ 0</text>
</svg>
